---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: bot-secret
  namespace: analyze-bot
spec:
  encryptedData:
    ADMIN_USER_ID: 
    CLICKHOUSE_DSN: 
    DISCORD_TOKEN: 
    MIGRATION: 
    MONGODB_DSN: 
    STORAGE_BACKEND: 
  template:
    metadata:
      name: bot-secret
      namespace: analyze-bot
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongo-secret
  namespace: analyze-bot
spec:
  encryptedData:
    MONGO_INITDB_DATABASE: 
    MONGO_INITDB_ROOT_PASSWORD: 
    MONGO_INITDB_ROOT_USERNAME: 
  template:
    metadata:
      name: mongo-secret
      namespace: analyze-bot
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: clickhouse-secret
  namespace: analyze-bot
spec:
  encryptedData:
    CLICKHOUSE_DB: 
    CLICKHOUSE_PASSWORD: 
    CLICKHOUSE_USER: 
  template:
    metadata:
      name: clickhouse-secret
      namespace: analyze-bot
    type: Opaque
