---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: bot-secret
  namespace: analyze-bot
spec:
  encryptedData:
    ADMIN_USER_ID: 
    DISCORD_TOKEN: 
    MONGODB_DSN: 
  template:
    metadata:
      name: bot-secret
      namespace: analyze-bot
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongo-secret
  namespace: analyze-bot
spec:
  encryptedData:
    MONGO_INITDB_DATABASE: 
    MONGO_INITDB_ROOT_PASSWORD: 
    MONGO_INITDB_ROOT_USERNAME: 
  template:
    metadata:
      name: mongo-secret
      namespace: analyze-bot
    type: Opaque
